{% extends 'base.html' %}
{% block title %}Enter Grade{% endblock %}
{% block page_title %}Enter Grade{% endblock %}
{% block topbar_actions %}<a href="{% url 'grade_list' %}" class="btn">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:680px;">
  <div class="card-header"><div class="card-title">{{ title }}</div></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>Student *</label>
          <select name="student" required>
            <option value="">Select student</option>
            {% for s in students %}<option value="{{ s.pk }}">{{ s.roll_number }} — {{ s.first_name }} {{ s.last_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Course *</label>
          <select name="course" required>
            <option value="">Select course</option>
            {% for c in courses %}<option value="{{ c.pk }}">{{ c.code }} — {{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Mid-Term Marks</label><input type="number" name="mid_marks" value="0" step="0.01" min="0" max="100"></div>
        <div class="form-group"><label>Final Marks</label><input type="number" name="final_marks" value="0" step="0.01" min="0" max="100"></div>
        <div class="form-group"><label>Assignment Marks</label><input type="number" name="assignment_marks" value="0" step="0.01" min="0" max="100"></div>
        <div class="form-group" style="display:flex;flex-direction:column;justify-content:flex-end;">
          <div style="background:#f0fdfa;border:1px solid #99f6e4;border-radius:6px;padding:10px 14px;font-size:13px;color:#0f766e;">
            Grade is calculated automatically based on total marks.
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn success">Save Grade</button>
        <a href="{% url 'grade_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
