{% extends 'base.html' %}
{% block title %}Mark Attendance{% endblock %}
{% block page_title %}Mark Attendance{% endblock %}
{% block topbar_actions %}<a href="{% url 'attendance_list' %}" class="btn">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:680px;">
  <div class="card-header"><div class="card-title">{{ title }}</div></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>Student *</label>
          <select name="student" required>
            <option value="">Select student</option>
            {% for s in students %}<option value="{{ s.pk }}">{{ s.roll_number }} — {{ s.first_name }} {{ s.last_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Course *</label>
          <select name="course" required>
            <option value="">Select course</option>
            {% for c in courses %}<option value="{{ c.pk }}">{{ c.code }} — {{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Date *</label><input type="date" name="date" required value="{% now 'Y-m-d' %}"></div>
        <div class="form-group">
          <label>Status *</label>
          <select name="status" required>
            <option value="present">Present</option>
            <option value="absent">Absent</option>
            <option value="late">Late</option>
            <option value="excused">Excused</option>
          </select>
        </div>
        <div class="form-group full"><label>Remarks</label><input type="text" name="remarks" placeholder="Optional notes…"></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn success">Save Attendance</button>
        <a href="{% url 'attendance_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
