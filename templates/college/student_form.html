{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block topbar_actions %}<a href="{% url 'student_list' %}" class="btn">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:860px;">
  <div class="card-header"><div class="card-title">{{ title }}</div></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label>First Name *</label><input type="text" name="first_name" value="{{ student.first_name|default:'' }}" required></div>
        <div class="form-group"><label>Last Name *</label><input type="text" name="last_name" value="{{ student.last_name|default:'' }}" required></div>
        <div class="form-group">
          <label>Gender *</label>
          <select name="gender" required>
            <option value="">Select</option>
            <option value="M" {% if student.gender == 'M' %}selected{% endif %}>Male</option>
            <option value="F" {% if student.gender == 'F' %}selected{% endif %}>Female</option>
            <option value="O" {% if student.gender == 'O' %}selected{% endif %}>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Date of Birth *</label><input type="date" name="date_of_birth" value="{{ student.date_of_birth|default:'' }}" required></div>
        <div class="form-group"><label>Email *</label><input type="email" name="email" value="{{ student.email|default:'' }}" required></div>
        <div class="form-group"><label>Phone *</label><input type="text" name="phone" value="{{ student.phone|default:'' }}" required></div>
        <div class="form-group">
          <label>Department *</label>
          <select name="department" required>
            <option value="">Select department</option>
            {% for d in departments %}<option value="{{ d.pk }}" {% if student.department_id == d.pk %}selected{% endif %}>{{ d.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Semester</label><input type="number" name="semester" value="{{ student.semester|default:'1' }}" min="1" max="12"></div>
        {% if student %}
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="active" {% if student.status == 'active' %}selected{% endif %}>Active</option>
            <option value="inactive" {% if student.status == 'inactive' %}selected{% endif %}>Inactive</option>
            <option value="graduated" {% if student.status == 'graduated' %}selected{% endif %}>Graduated</option>
            <option value="suspended" {% if student.status == 'suspended' %}selected{% endif %}>Suspended</option>
          </select>
        </div>
        {% endif %}
        <div class="form-group full"><label>Address *</label><textarea name="address" required>{{ student.address|default:'' }}</textarea></div>
        <div class="form-group"><label>Guardian Name</label><input type="text" name="guardian_name" value="{{ student.guardian_name|default:'' }}"></div>
        <div class="form-group"><label>Guardian Phone</label><input type="text" name="guardian_phone" value="{{ student.guardian_phone|default:'' }}"></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn success">Save Student</button>
        <a href="{% url 'student_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
