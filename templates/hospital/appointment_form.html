{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block topbar_actions %}<a href="{% url 'appointment_list' %}" class="btn">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header"><div class="card-title">{{ title }}</div></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>Patient *</label>
          <select name="patient" required>
            <option value="">Select patient</option>
            {% for p in patients %}<option value="{{ p.pk }}">{{ p.patient_id }} — {{ p.first_name }} {{ p.last_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Doctor *</label>
          <select name="doctor" required>
            <option value="">Select doctor</option>
            {% for d in doctors %}<option value="{{ d.pk }}">Dr. {{ d.first_name }} {{ d.last_name }} ({{ d.get_specialization_display }})</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Date *</label><input type="date" name="appointment_date" required></div>
        <div class="form-group"><label>Time *</label><input type="time" name="appointment_time" required></div>
        <div class="form-group full"><label>Reason</label><textarea name="reason" rows="3"></textarea></div>
        <div class="form-group full"><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn primary">Schedule Appointment</button>
        <a href="{% url 'appointment_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
