{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block topbar_actions %}
<a href="{% url 'patient_list' %}" class="btn">← Back</a>
{% endblock %}
{% block content %}
<div class="card" style="max-width:860px;">
  <div class="card-header"><div class="card-title">{{ title }}</div></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="first_name" value="{{ patient.first_name|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="last_name" value="{{ patient.last_name|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Gender *</label>
          <select name="gender" required>
            <option value="">Select gender</option>
            <option value="M" {% if patient.gender == 'M' %}selected{% endif %}>Male</option>
            <option value="F" {% if patient.gender == 'F' %}selected{% endif %}>Female</option>
            <option value="O" {% if patient.gender == 'O' %}selected{% endif %}>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date of Birth *</label>
          <input type="date" name="date_of_birth" value="{{ patient.date_of_birth|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Blood Group</label>
          <select name="blood_group">
            <option value="">Unknown</option>
            {% for bg in "A+,A-,B+,B-,O+,O-,AB+,AB-"|split:"," %}
            <option value="{{ bg }}" {% if patient.blood_group == bg %}selected{% endif %}>{{ bg }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="text" name="phone" value="{{ patient.phone|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" value="{{ patient.email|default:'' }}">
        </div>
        <div class="form-group full">
          <label>Address *</label>
          <textarea name="address" required>{{ patient.address|default:'' }}</textarea>
        </div>
        <div class="form-group">
          <label>Emergency Contact Name</label>
          <input type="text" name="emergency_contact" value="{{ patient.emergency_contact|default:'' }}">
        </div>
        <div class="form-group">
          <label>Emergency Phone</label>
          <input type="text" name="emergency_phone" value="{{ patient.emergency_phone|default:'' }}">
        </div>
        <div class="form-group full">
          <label>Medical History</label>
          <textarea name="medical_history" rows="4">{{ patient.medical_history|default:'' }}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn primary">Save Patient</button>
        <a href="{% url 'patient_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
