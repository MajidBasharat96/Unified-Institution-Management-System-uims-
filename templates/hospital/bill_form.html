{% extends 'base.html' %}
{% block title %}Create Bill{% endblock %}
{% block page_title %}Create Bill{% endblock %}
{% block topbar_actions %}<a href="{% url 'bill_list' %}" class="btn">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-header"><div class="card-title">{{ title }}</div></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group full">
          <label>Patient *</label>
          <select name="patient" required>
            <option value="">Select patient</option>
            {% for p in patients %}<option value="{{ p.pk }}">{{ p.patient_id }} — {{ p.first_name }} {{ p.last_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Total Amount (PKR) *</label><input type="number" name="total_amount" step="0.01" required></div>
        <div class="form-group"><label>Paid Amount (PKR)</label><input type="number" name="paid_amount" step="0.01" value="0"></div>
        <div class="form-group full"><label>Notes</label><textarea name="notes"></textarea></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn primary">Create Bill</button>
        <a href="{% url 'bill_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
