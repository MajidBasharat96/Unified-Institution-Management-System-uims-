{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block topbar_actions %}<a href="{% url 'doctor_list' %}" class="btn">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:800px;">
  <div class="card-header"><div class="card-title">{{ title }}</div></div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label>First Name *</label><input type="text" name="first_name" value="{{ doctor.first_name|default:'' }}" required></div>
        <div class="form-group"><label>Last Name *</label><input type="text" name="last_name" value="{{ doctor.last_name|default:'' }}" required></div>
        <div class="form-group">
          <label>Specialization *</label>
          <select name="specialization" required>
            {% for val, label in specializations %}
            <option value="{{ val }}" {% if doctor.specialization == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Email *</label><input type="email" name="email" value="{{ doctor.email|default:'' }}" required></div>
        <div class="form-group"><label>Phone *</label><input type="text" name="phone" value="{{ doctor.phone|default:'' }}" required></div>
        <div class="form-group"><label>Qualification *</label><input type="text" name="qualification" value="{{ doctor.qualification|default:'' }}" placeholder="MBBS, FCPS…" required></div>
        <div class="form-group"><label>Experience (years)</label><input type="number" name="experience_years" value="{{ doctor.experience_years|default:'0' }}" min="0"></div>
        <div class="form-group"><label>Consultation Fee (PKR)</label><input type="number" name="consultation_fee" value="{{ doctor.consultation_fee|default:'0' }}" step="0.01"></div>
        {% if doctor %}
        <div class="form-group">
          <label>Available</label>
          <select name="is_available">
            <option value="on" {% if doctor.is_available %}selected{% endif %}>Yes</option>
            <option value="" {% if not doctor.is_available %}selected{% endif %}>No</option>
          </select>
        </div>
        {% endif %}
      </div>
      <div class="form-actions">
        <button type="submit" class="btn primary">Save Doctor</button>
        <a href="{% url 'doctor_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
